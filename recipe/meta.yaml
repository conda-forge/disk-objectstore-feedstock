{% set name = "disk-objectstore" %}
{% set version = "1.5.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-','_') }}-{{ version }}.tar.gz
  sha256: 1327843630dfec5956c5c92b14001e75aaf12f3014f98fd71e8ab896f1546e2e

build:
  number: 1
  entry_points:
    - dostore = disk_objectstore.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python {{ python_min }}
    - flit-core
  run:
    - python >={{ python_min }}
    - click
    - sqlalchemy >=1.4.22

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - disk_objectstore
    - disk_objectstore.examples
  commands:
    - pip check
    - dostore --help

about:
  home: http://github.com/aiidateam/disk-objectstore
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: An implementation of an efficient object store writing directly into a disk folder

extra:
  recipe-maintainers:
    - khsrali
    - giovannipizzi
    - agoscinski
    - GeigerJ2
    - edan-bainglass
    - danielhollas 
